name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ------------------------------------------------------------------
  # Cross-compile the cdylib for six platforms. Each job uploads a
  # single asset named the way `NativeLoader.assetName()` expects.
  # ------------------------------------------------------------------
  build-native:
    name: native / ${{ matrix.settings.asset }}
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: libktav_cabi-linux-amd64.so
            artifact: libktav_cabi.so
            use-zigbuild: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: libktav_cabi-linux-arm64.so
            artifact: libktav_cabi.so
            use-zigbuild: true

          - os: macos-latest
            target: x86_64-apple-darwin
            asset: libktav_cabi-darwin-amd64.dylib
            artifact: libktav_cabi.dylib
            use-zigbuild: false

          - os: macos-latest
            target: aarch64-apple-darwin
            asset: libktav_cabi-darwin-arm64.dylib
            artifact: libktav_cabi.dylib
            use-zigbuild: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: ktav_cabi-windows-amd64.dll
            artifact: ktav_cabi.dll
            use-zigbuild: false

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset: ktav_cabi-windows-arm64.dll
            artifact: ktav_cabi.dll
            use-zigbuild: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}

      - name: Install zig
        if: matrix.settings.use-zigbuild
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0
      - name: Install cargo-zigbuild
        if: matrix.settings.use-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build (zigbuild)
        if: matrix.settings.use-zigbuild
        run: cargo zigbuild --release -p ktav-cabi --target ${{ matrix.settings.target }}.2.17

      - name: Build (native)
        if: ${{ !matrix.settings.use-zigbuild }}
        run: cargo build --release -p ktav-cabi --target ${{ matrix.settings.target }}

      - name: Rename artifact
        shell: bash
        run: |
          src="target/${{ matrix.settings.target }}/release/${{ matrix.settings.artifact }}"
          ls -la "$src"
          cp "$src" "${{ matrix.settings.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.settings.asset }}
          path: ${{ matrix.settings.asset }}
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Build the Java JARs (main / sources / javadoc). These are attached
  # to the release alongside the native binaries so consumers can pull
  # them directly until Maven Central publishing is set up.
  # ------------------------------------------------------------------
  build-jars:
    name: build JARs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Gradle build
        run: ./gradlew :lib:jar :lib:sourcesJar :lib:javadocJar --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: jars
          path: lib/build/libs/*.jar
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Publish the JARs to Maven Central via Sonatype Central Portal.
  # The vanniktech plugin handles signing, staging upload, and (with
  # automaticRelease=true on the build side) promotion to the public
  # repository. Credentials and the GPG key come from repo secrets.
  # ------------------------------------------------------------------
  publish-maven:
    name: publish to Maven Central
    needs: build-jars
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish to Maven Central
        env:
          # vanniktech plugin reads these as Gradle project properties
          # (the ORG_GRADLE_PROJECT_ prefix is the standard pass-through).
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          # Base64-encoded armored private key — vanniktech 0.30+ auto-
          # detects base64 and decodes. Passphrase is empty (key was
          # generated with %no-protection), so no GPG_PASSPHRASE secret.
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
        run: ./gradlew :lib:publishAndReleaseToMavenCentral --no-configuration-cache --no-daemon

  # ------------------------------------------------------------------
  # Attach artifacts to the GitHub Release matching the tag.
  # ------------------------------------------------------------------
  release:
    needs: [build-native, build-jars]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
