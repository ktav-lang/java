name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ------------------------------------------------------------------
  # Build native library + run Java tests in one job per OS. The test
  # suite hardcodes both paths (cabi at `target/release/...`, spec at
  # `spec/versions/0.1/tests`) — no env wiring needed.
  # ------------------------------------------------------------------
  test:
    name: ${{ matrix.os }} / JDK ${{ matrix.jdk }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        jdk: ["17", "21"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Build native library
        run: cargo build --release -p ktav-cabi

      - name: Gradle test
        run: ./gradlew :lib:test --no-daemon --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.os }}-jdk${{ matrix.jdk }}
          path: lib/build/reports/tests/test
          retention-days: 7

  lint-rust:
    name: rust clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --release -p ktav-cabi -- -D warnings

  build-jar:
    name: build library JAR (no native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :lib:jar :lib:sourcesJar :lib:javadocJar --no-daemon
      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: ktav-jars
          path: |
            lib/build/libs/*.jar
          retention-days: 14
